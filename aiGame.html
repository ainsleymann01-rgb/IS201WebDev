<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Explorer Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#1b5e20, #81c784);
    color: white;
}

/* NAVBAR */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #0d3b12;
    padding: 12px 0;
    text-align: center;
    z-index: 1000;
}

.nav a {
    color: white;
    text-decoration: none;
    margin: 0 20px;
    font-size: 18px;
    font-weight: bold;
}

.nav a:hover {
    text-decoration: underline;
}

/* MAIN LAYOUT AREA (THIS FIXES CENTERING) */
.main {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 60px; /* space for navbar */
    box-sizing: border-box;
}

/* TITLE */
h1 {
    margin: 10px;
}

#info {
    margin: 10px;
    font-size: 18px;
}

/* GAME WRAPPER */
.game-wrapper {
    position: relative;
    padding: 40px;
}

/* BORDER DECOR */
.border-decor {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
}

.top {
    top: 0;
    width: 100%;
    text-align: center;
}

.bottom {
    bottom: 0;
    width: 100%;
    text-align: center;
}

.left, .right {
    top: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
}

.left { left: 0; }
.right { right: 0; }

canvas {
    background: #2e7d32;
    border: 4px solid #0d3b12;
    border-radius: 10px;
}

/* BUTTON */
button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    background: #0d3b12;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #145a1a;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <a href="index.html">Resume</a>
    <a href="fromScratch.html">Main Page</a>
</div>

<!-- CENTERING CONTAINER -->
<div class="main">

    <h1>🌲 Trail Explorer 🧗</h1>

    <div id="info">
        Score: <span id="score">0</span>
    </div>

    <div class="game-wrapper">

        <!-- Decorations -->
        <div class="border-decor top">⛰️ 🌲 ⛰️ 🌲 ⛰️ 🌲 ⛰️</div>
        <div class="border-decor bottom">🌲 ⛰️ 🌲 ⛰️ 🌲 ⛰️ 🌲</div>

        <div class="border-decor left">
            <span>🌲</span><span>⛰️</span><span>🌲</span><span>⛰️</span>
        </div>

        <div class="border-decor right">
            <span>⛰️</span><span>🌲</span><span>⛰️</span><span>🌲</span>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

    </div>

    <button onclick="startGame()">Start Game</button>

</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gridSize = 20;
let tileCount = canvas.width / gridSize;

let trail = [{x:10,y:10}];
let dx = 0;
let dy = 0;
let food = {x:5,y:5};
let score = 0;
let speed = 150;
let gameInterval;

function startGame() {
    trail = [{x:10,y:10}];
    dx = 1;
    dy = 0;
    score = 0;
    speed = 150;
    placeFood();
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, speed);
}

function gameLoop() {
    update();
    draw();
}

function update() {
    let head = {x: trail[0].x + dx, y: trail[0].y + dy};

    if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
    }

    for (let t of trail) {
        if (head.x === t.x && head.y === t.y) {
            gameOver();
        }
    }

    trail.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById("score").innerText = score;

        placeFood();

        speed *= 0.95;
        clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, speed);
    } else {
        trail.pop();
    }
}

function draw() {
    ctx.fillStyle = "#2e7d32";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#a5d6a7";
    for (let i = 1; i < trail.length; i++) {
        ctx.fillRect(
            trail[i].x * gridSize,
            trail[i].y * gridSize,
            gridSize - 4,
            gridSize - 4
        );
    }

    let head = trail[0];
    ctx.font = "18px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🧗", head.x * gridSize + gridSize/2, head.y * gridSize + gridSize/2);

    ctx.fillText("⛰️", food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2);
}

function placeFood() {
    food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
    };
}

function gameOver() {
    clearInterval(gameInterval);
    alert("Game Over! Final Score: " + score);
}

document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
    if (e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
    if (e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
    if (e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
});
</script>

</body>
</html>
